name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Type-check · Lint · Test
    runs-on: ubuntu-latest

    env:
      # Prisma needs a DATABASE_URL to generate the client (no real DB needed for CI)
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci_db?schema=public"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/ci_db?schema=public"
      JWT_SECRET: "ci-placeholder-secret"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test
