<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="68%">
      <stop offset="0%"   stop-color="#1e44a0"/>
      <stop offset="100%" stop-color="#050f1a"/>
    </radialGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#eef2fa"/>
      <stop offset="35%"  stop-color="#b0bdd0"/>
      <stop offset="65%"  stop-color="#8098b4"/>
      <stop offset="100%" stop-color="#c8d4e4"/>
    </linearGradient>
    <radialGradient id="hub" cx="38%" cy="33%" r="70%">
      <stop offset="0%"   stop-color="#2c68b8"/>
      <stop offset="100%" stop-color="#0a2a66"/>
    </radialGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#d0ddf0"/>
      <stop offset="100%" stop-color="#90a8c4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!--
    8-tooth gear polygon (center 256,256)
    Outer tip R=210  Root R=180  Tooth arc ±8°  Valley half-arc 14.5°
  -->
  <polygon fill="url(#silver)" points="
    430,211 464,227 464,285 430,301
    411,347 424,382 382,424 347,411
    301,430 285,464 227,464 211,430
    165,411 130,424  88,382 101,347
     82,301  48,285  48,227  82,211
    101,165  88,130 130, 88 165,101
    211, 82 227, 48 285, 48 301, 82
    347,101 382, 88 424,130 411,165
  "/>

  <!-- Hub disc (blue-steel) -->
  <circle cx="256" cy="256" r="166" fill="url(#hub)"/>

  <!-- Bold A&R centred in hub -->
  <text
    x="256" y="292"
    font-family="'Arial Black','Impact','Arial Bold',sans-serif"
    font-size="128"
    font-weight="900"
    text-anchor="middle"
    fill="url(#txt)"
    letter-spacing="-2"
  >A&amp;R</text>

  <!-- Centre bolt dot -->
  <circle cx="256" cy="256" r="20" fill="#020b18" opacity="0.85"/>
</svg>