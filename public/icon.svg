<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente de fondo azul -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3D"/>
      <stop offset="50%" stop-color="#0A2451"/>
      <stop offset="100%" stop-color="#081A38"/>
    </linearGradient>
    <!-- Gradiente metálico plateado -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EDF5"/>
      <stop offset="25%" stop-color="#B8C5D5"/>
      <stop offset="50%" stop-color="#8FA3BD"/>
      <stop offset="75%" stop-color="#B8C5D5"/>
      <stop offset="100%" stop-color="#6B7F98"/>
    </linearGradient>
    <!-- Gradiente metálico oscuro -->
    <linearGradient id="metalDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5A6B7E"/>
      <stop offset="50%" stop-color="#8FA3BD"/>
      <stop offset="100%" stop-color="#C5D0DE"/>
    </linearGradient>
    <!-- Gradiente para pistón -->
    <linearGradient id="pistonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0D8E5"/>
      <stop offset="30%" stop-color="#9EAEC2"/>
      <stop offset="70%" stop-color="#7D8FA6"/>
      <stop offset="100%" stop-color="#5C6D82"/>
    </linearGradient>
    <!-- Sombra -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Engranaje principal -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Círculo exterior con dientes -->
    <g fill="url(#metalGrad)" stroke="url(#metalDark)" stroke-width="2">
      <!-- Dientes del engranaje (16 dientes) -->
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(0)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(22.5)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(45)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(67.5)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(90)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(112.5)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(135)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(157.5)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(180)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(202.5)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(225)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(247.5)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(270)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(292.5)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(315)"/>
      <path d="M0,-195 L15,-195 L18,-175 L-18,-175 L-15,-195 Z" transform="rotate(337.5)"/>
    </g>
    
    <!-- Anillo exterior del engranaje -->
    <circle r="175" fill="none" stroke="url(#metalGrad)" stroke-width="28"/>
    <circle r="175" fill="none" stroke="url(#metalDark)" stroke-width="2"/>
    <circle r="161" fill="none" stroke="url(#metalDark)" stroke-width="2"/>
    
    <!-- Círculo interior (hueco central) -->
    <circle r="145" fill="url(#bgGrad)"/>
    <circle r="145" fill="none" stroke="url(#metalGrad)" stroke-width="8"/>

    <!-- Pistón 1 (superior izquierdo hacia inferior derecho) -->
    <g transform="rotate(-30)" filter="url(#innerGlow)">
      <!-- Cabeza del pistón -->
      <ellipse cx="0" cy="-100" rx="35" ry="25" fill="url(#pistonGrad)" stroke="url(#metalDark)" stroke-width="2"/>
      <rect x="-30" y="-95" width="60" height="12" fill="url(#metalGrad)"/>
      <!-- Biela -->
      <rect x="-12" y="-80" width="24" height="140" rx="6" fill="url(#pistonGrad)" stroke="url(#metalDark)" stroke-width="2"/>
      <!-- Unión inferior -->
      <circle cx="0" cy="60" r="22" fill="url(#metalGrad)" stroke="url(#metalDark)" stroke-width="2"/>
      <circle cx="0" cy="60" r="10" fill="url(#bgGrad)"/>
    </g>

    <!-- Pistón 2 (superior derecho hacia inferior izquierdo) -->
    <g transform="rotate(30)" filter="url(#innerGlow)">
      <!-- Cabeza del pistón -->
      <ellipse cx="0" cy="-100" rx="35" ry="25" fill="url(#pistonGrad)" stroke="url(#metalDark)" stroke-width="2"/>
      <rect x="-30" y="-95" width="60" height="12" fill="url(#metalGrad)"/>
      <!-- Biela -->
      <rect x="-12" y="-80" width="24" height="140" rx="6" fill="url(#pistonGrad)" stroke="url(#metalDark)" stroke-width="2"/>
      <!-- Unión inferior -->
      <circle cx="0" cy="60" r="22" fill="url(#metalGrad)" stroke="url(#metalDark)" stroke-width="2"/>
      <circle cx="0" cy="60" r="10" fill="url(#bgGrad)"/>
    </g>

    <!-- Centro del cigüeñal -->
    <circle r="30" fill="url(#metalGrad)" stroke="url(#metalDark)" stroke-width="3"/>
    <circle r="15" fill="url(#bgGrad)" stroke="url(#metalDark)" stroke-width="2"/>

    <!-- Brillos decorativos -->
    <circle r="172" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  </g>
</svg>